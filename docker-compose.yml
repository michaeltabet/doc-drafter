services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-drafter-frontend
    restart: unless-stopped
    ports:
      - "8230:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-drafter-backend
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
